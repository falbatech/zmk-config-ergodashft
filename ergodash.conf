# Backlight (LED 3mm jednokolorowe sterowane MOSFET na pinie D10/P0.09, PWM)
CONFIG_ZMK_BACKLIGHT=y
CONFIG_PWM=y
CONFIG_LED_PWM=y

# Wyświetlacz nice!view
CONFIG_ZMK_DISPLAY=y

# BT moc nadawcza (jak w innych klawiaturach FT)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Sleep + nazwa
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_KEYBOARD_NAME="ErgoDash FT"

# ZMK Studio
CONFIG_ZMK_STUDIO=y

# Eager debouncing (jak w corne/redox FT)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7

# Auto-off backlight - oszczędza baterię (odkomentuj jeśli chcesz)
# CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=y
# CONFIG_ZMK_BACKLIGHT_AUTO_OFF_USB=y
